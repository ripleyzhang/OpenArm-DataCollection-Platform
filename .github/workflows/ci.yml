name: CI

on:
  push:
    branches:
      - main
      - master
  pull_request:

jobs:
  test:
    name: Test mock OpenArm data pipeline
    runs-on: ubuntu-22.04

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y can-utils iproute2 kmod

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Check Python syntax
        run: |
          python -m compileall scripts src tests

      - name: Lint with ruff
        run: |
          ruff check scripts src tests

      - name: Task 1 - verify mock CAN setup
        run: |
          chmod +x scripts/setup_vcan.sh
          chmod +x scripts/openarm-can-cli

          ./scripts/setup_vcan.sh

          ./scripts/openarm-can-cli -i can0 can_configure
          ./scripts/openarm-can-cli -i can1 can_configure

          ./scripts/openarm-can-cli -i can0 zero
          ./scripts/openarm-can-cli -i can1 zero

          ./scripts/openarm-can-cli -i can0 status
          ./scripts/openarm-can-cli -i can1 status

          ip -details link show can0
          ip -details link show can1

      - name: Task 2 - verify mock CAN-FD data stream
        run: |
          mkdir -p data

          ./scripts/setup_vcan.sh

          python scripts/mock_damiao_stream.py --rate-hz 50 &
          STREAM_PID=$!

          sleep 1

          python scripts/read_joint_states.py \
            --duration-s 3 \
            --output data/joint_states_mock.jsonl

          kill "$STREAM_PID" || true
          wait "$STREAM_PID" || true

          test -f data/joint_states_mock.jsonl
          FRAME_COUNT=$(wc -l < data/joint_states_mock.jsonl)
          echo "Parsed frame count: $FRAME_COUNT"

          if [ "$FRAME_COUNT" -lt 100 ]; then
            echo "Expected at least 100 parsed joint-state frames"
            exit 1
          fi

          head -n 5 data/joint_states_mock.jsonl

      - name: Task 3 - test camera synchronization
        run: |
          pytest tests/test_task3_sync.py -q

      - name: Task 4 - test storage and API
        run: |
          pytest tests/test_task4_storage_api.py -q

      - name: Run all unit tests
        run: |
          pytest tests -q

      - name: Upload mock outputs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: mock-task-outputs
          path: |
            data/
            mock_state/

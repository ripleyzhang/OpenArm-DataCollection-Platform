name: CI

on:
  push:
    branches:
      - main
      - master
  pull_request:

jobs:
  test:
    name: Test mock OpenArm data pipeline
    runs-on: ubuntu-22.04

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y can-utils iproute2 kmod

          sudo apt-get install -y "linux-modules-extra-$(uname -r)" || true
          sudo modprobe vcan

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Check Python syntax
        run: |
          python -m compileall scripts

      - name: Lint with ruff
        run: |
          ruff check scripts

      - name: Task 1 - verify mock CAN setup
        run: |
          chmod +x scripts/verify_task1_mock.sh
          chmod +x scripts/openarm-can-cli
          ./scripts/verify_task1_mock.sh

      - name: Task 2 - verify mock CAN-FD data stream
        run: |
          chmod +x scripts/verify_task2_mock.sh
          ./scripts/verify_task2_mock.sh

      # - name: Task 3 - test camera synchronization
      #   run: |
      #     pytest tests/test_task3_sync.py -q

      # - name: Task 4 - test storage and API
      #   run: |
      #   pytest tests/test_task4_storage_api.py -q

      # - name: Run all unit tests
      #   run: |
      #     pytest tests -q

      - name: Upload mock outputs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: mock-task-outputs
          path: |
            data/
            mock_state/
